services:
  - type: web
    name: requirement-compass-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DAILY_TOKEN_LIMIT
        value: "0"
      - key: DB_PATH
        value: /var/data/requirement_compass.db
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: requirement-compass-db
      mountPath: /var/data
      sizeGB: 1

  - type: web
    name: requirement-compass-frontend
    env: node
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://requirement-compass-backend.onrender.com/api
