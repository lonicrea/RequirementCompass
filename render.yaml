services:
  - type: web
    name: requirement-compass-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DAILY_TOKEN_LIMIT
        value: "0"
      - key: DB_PATH
        value: /tmp/requirement_compass.db
      - key: OPENAI_API_KEY
        sync: false
