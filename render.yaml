services:
  - type: web
    name: requirement-compass-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DAILY_TOKEN_LIMIT
        value: "0"
      - key: DB_PATH
        value: /tmp/requirement_compass.db
      - key: CORS_ALLOW_ORIGINS
        value: http://localhost:5175,http://127.0.0.1:5175,https://frontend-six-silk-67.vercel.app
      - key: CORS_ALLOW_ORIGIN_REGEX
        value: ^https://.*\.vercel\.app$
      - key: QUESTION_DYNAMIC_USE_LLM
        value: "false"
      - key: QUESTION_DYNAMIC_TEMPERATURE
        value: "0"
      - key: OPENAI_API_KEY
        sync: false
